/*이미지 효과*/
    
        .pofol {
          font-family: "나눔스퀘어";
          position: relative;
          overflow: hidden;
          min-width: 230px;
          max-width: 315px;
          width: 100%;
          color: #4f5052;
          text-align: left;
          line-height: 1.4em;
          font-size: 16px;
          float:left;
          margin:10px;


        }
        .pofol * {
          -webkit-box-sizing: border-box;
          box-sizing: border-box;
          -webkit-transition: all 0.35s ease;
          transition: all 0.35s ease;
        }
        .pofol img {
          max-width: 100%;
          vertical-align: top;
        }
        .pofol figcaption {
          position: absolute;
          top: calc(100%);
          width: 100%;
          background-color: #ffffff;
          padding: 15px 25px 65px;
        }


        .pofol h3,
        .pofol p {
          margin: 0 0 10px;
        }
        .pofol h3 {
          font-weight: 300;
          font-size: 1.4em;
          line-height: 1.2em;
          font-family: "빙그레체";
          
        }
        .pofol p {
          font-size: 0.9em;
          letter-spacing: 1px;
          opacity: 0.9;
        }

        .pofol:hover figcaption,
        .pofol.hover figcaption {
          top: 0px;
        }
            h1{
