/* 이미지 효과 */
            figure.main {
              font-family: "나눔 스퀘어";
              position: relative;
              float: left;
              overflow: hidden;
              margin: 10px 1%;
              min-width: 230px;

              max-height: 600px;
              width: 100%;
              color: #ffffff;
              text-align: center;
              font-size: 16px;
              margin-top : 0px;
            }

            figure.main * {
              -webkit-box-sizing: border-box;
              box-sizing: border-box;
              -webkit-transition: all 0.35s ease;
              transition: all 0.35s ease;
            }

            figure.main img {
              max-width: 100%;
            }

            figure.main:after,
            figure.main:before,
            figure.main figcaption:after,
            figure.main figcaption:before {
              background: #0a0a0a;
              height: 25%;
              position: absolute;
              content: '';
              opacity: 0;
              -webkit-transition: all 0.35s steps(4);
              transition: all 0.35s steps(4);
              z-index: 1;
              left: 50%;
              right: 50%;
            }

            figure.main:before {
              top: 0;
              -webkit-transition-delay: 0;
              transition-delay: 0;
            }

            figure.main:after {
              top: 25%;
              -webkit-transition-delay: 0.1s;
              transition-delay: 0.1s;
            }

            figure.main figcaption:before {
              top: 50%;
              -webkit-transition-delay: 0.2s;
              transition-delay: 0.2s;
              z-index: -1;
            }

            figure.main figcaption:after {
              top: 75%;
              -webkit-transition-delay: 0.3s;
              transition-delay: 0.3s;
              z-index: -1;
            }

            figure.main figcaption {
              position: absolute;
              top: 0;
              bottom: 0;
              left: 0;
              right: 0;
              z-index: 2;
              padding: 30px;
            }

            figure.main h2,
            figure.main p,
            figure.main .icons {
              margin: 0;
              width: 100%;
              opacity: 0;
            }

            figure.main h2 {
              font-weight: 900;
              text-transform: uppercase;
            }

            figure.main p {
              font-weight: 300;
            }

            figure.main .icons {
              position: absolute;
              bottom: 30px;
              left: 0;
              width: 100%;
            }

            figure.main i {
              padding: 0px 10px;
              display: inline-block;
              font-size: 24px;
              color: #ffffff;
              text-align: center;
              opacity: 0.8;
              text-decoration: none;
            }

            figure.main i:hover {
              opacity: 1;
            }

            figure.main:hover:after,
            figure.main.hover:after,
            figure.main:hover:before,
            figure.main.hover:before,
            figure.main:hover figcaption:after,
            figure.main.hover figcaption:after,
            figure.main:hover figcaption:before,
            figure.main.hover figcaption:before {
              left: 0;
              right: 0;
              opacity: 0.8;
            }

            figure.main:hover figcaption h2,
            figure.main.hover figcaption h2,
            figure.main:hover figcaption p,
            figure.main.hover figcaption p,
            figure.main:hover figcaption .icons,
            figure.main.hover figcaption .icons {
              -webkit-transition-delay: 0.25s;
              transition-delay: 0.25s;
            }

            figure.main:hover figcaption h2,
            figure.main.hover figcaption h2,
            figure.main:hover figcaption .icons,
            figure.main.hover figcaption .icons {

            }
